<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click to start</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="final.css">
    <style>
        #startButton {
            position: absolute;
            top: 100px;
            left: 100px;
        }
    </style>
    
</head>
<body>
    <button><a href="games.html" style="color: #60f6bf;">go back to games</a></button>
    <button id="startButton" onmouseover="moveButton()"  style="color: #60f6bf;">Click here to start</button>
</body>
<script>
    function moveButton() {
        var button = document.getElementById("startButton");
        var width = window.innerWidth;
        var height = window.innerHeight;
        
        //Gets a random position in the width
        width = Math.random() * width;
        height = Math.random() * height;
        
        button.style.left = width + "px";
        button.style.top = height + "px";
    }
</script>
</html>
